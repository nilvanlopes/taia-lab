experiment:
  name: exp04_credit_pipeline_A1_bs32
  description: >
    Execução de um pipeline supervisionado completo com redução de batch size:
    batch_size alterado de 64 para 32 para avaliar impacto na frequência
    de atualização dos pesos e nas métricas de validação.
    Baseado no exp04_pipeline.yaml.

data:
  seed: 42
  n_samples: 1500
  n_features: 5
  test_size: 0.3

train:
  epochs: 20
  batch_size: 32
  lr: 0.001

model:
  hidden_dim: 64
  n_classes: 2

tracking:
  tool: mlflow
  experiment_name: taia_pipeline
  tags:
    aula: "06"
    pipeline: supervised
    run_type: pipeline
    purpose: batch_size_adjustment
    dataset: synthetic_credit

runtime:
  deterministic: true
  device_preference: auto   # auto|cuda|mps|cpu
