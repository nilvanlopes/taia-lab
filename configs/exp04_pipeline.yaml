experiment:
  name: exp04_credit_pipeline
  description: >
    Execução de um pipeline supervisionado completo:
    ingestão de dados -> preparação -> treinamento -> avaliação ->
    registro do modelo e métricas -> versionamento de artefatos.
    Demonstra a operacionalização do fluxo de ML dentro de uma
    estrutura rastreável.

data:
  seed: 42
  n_samples: 1500
  n_features: 5
  test_size: 0.3

train:
  epochs: 20
  batch_size: 64
  lr: 0.001

model:
  hidden_dim: 64
  n_classes: 2

tracking:
  tool: mlflow
  experiment_name: taia_pipeline
  tags:
    aula: "05"
    pipeline: supervised
    run_type: pipeline
    purpose: operational_flow
    dataset: synthetic_credit

runtime:
  deterministic: true
  device_preference: auto   # auto|cuda|mps|cpu