experiment:
  name: exp03_hidden128
  description: >
    Experimento 3: altera somente model.hidden_dim de 64 para 128, mantendo dados e treino.
    Hipótese: maior capacidade de representação pode aumentar val_acc, mas pode elevar
    val_loss (overfitting) se a capacidade exceder o necessário para os dados sintéticos.

data:
  seed: 42
  n_samples: 1200
  n_features: 20
  test_size: 0.2

train:
  epochs: 20
  batch_size: 64
  lr: 0.001

model:
  hidden_dim: 128
  n_classes: 2

tracking:
  tool: mlflow
  experiment_name: taia_aula03
  tags:
    aula: "03"
    run_type: experiment
    variant: capacity_test
    changed_param: "model.hidden_dim"
    hypothesis: "hidden_dim maior pode melhorar val_acc com risco de overfitting"

runtime:
  deterministic: true
  device_preference: auto   # auto|cuda|mps|cpu